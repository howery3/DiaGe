kind = "data-app"
previewPath = "/corporate/"
title = "DiaGe Corporate Dashboard"
version = "1.0.0"
id = "artifacts/corporate"
router = "path"

[[integratedSkills]]
name = "data-visualization"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/corporate/" ]
localPort = 24664

[services.development]
run = "pnpm --filter @workspace/corporate run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/corporate", "run", "build" ]
publicDir = "artifacts/corporate/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24664"
BASE_PATH = "/corporate/"
